schedule:
  times: ["08:00", "20:00"]
  timezone: "Europe/London"
  scan_lookback_hours: 12

sources:
  huggingface:
    enabled: true
    pipeline_tags:
      - text-generation
      - image-text-to-text
      - text-to-image
      - automatic-speech-recognition
      - text-to-speech
    min_likes: 5

whatsapp:
  target_groups:
    - "Test"

gateway:
  port: 3001
  bot_incoming_url: "http://localhost:8000/incoming"

bot:
  port: 8000

litellm:
  base_url: "http://localhost:4000"
  model: "your-model-here"
