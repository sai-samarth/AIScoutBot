schedule:
  times: ["08:00", "20:00"]
  timezone: "Europe/London"
  scan_lookback_hours: 12

sources:
  huggingface:
    enabled: true
    pipeline_tags:
      - text-generation
      - image-text-to-text
      - text-to-image
      - automatic-speech-recognition
      - text-to-speech
    min_likes: 5
    # Tier 1: scan these orgs every scan_interval_minutes, alert immediately on new models
    watched_orgs:
      - meta-llama
      - google
      - mistralai
      - Qwen
      - deepseek-ai
      - microsoft
      - black-forest-labs
      - MiniMaxAI
      - stabilityai
      - 01-ai
      - THUDM
      - tiiuae
      - CohereForAI
      - nvidia
      - apple
      - alibaba-nlp
      - openai
      - xai-org
      - ByteDance-Seed
      - ai21labs
      - ibm-granite
    # Tier 2: base likes threshold for composite scoring (arxiv, likes, downloads, org)
    trending_min_likes: 20
    trending_lookback_hours: 24
    # How often to run the Tier 1+2 alert scan (in minutes)
    scan_interval_minutes: 15

whatsapp:
  target_groups:
    - "Test"

gateway:
  port: 3001
  bot_incoming_url: "http://localhost:8000/incoming"

bot:
  port: 8000

litellm:
  base_url: "http://localhost:4000"
  model: "your-model-here"
