services:
  gateway:
    build: ./gateway
    restart: always
    stop_grace_period: 30s
    ports:
      - "3001:3001"
    volumes:
      - gateway_session:/app/session
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - GATEWAY_PORT=3001
      - BOT_INCOMING_URL=http://bot:8000/incoming
      - LOG_LEVEL=info
      # Optional: set HF_TOKEN in a .env file or environment
      # - HF_TOKEN=your_token_here

  bot:
    build: ./bot
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - bot_data:/srv/bot/data
      - ./config.yaml:/srv/bot/config.yaml:ro
    environment:
      - GATEWAY_URL=http://gateway:3001
      - HF_TOKEN=${HF_TOKEN:-}
      - BOT_JID=${BOT_JID:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
    depends_on:
      - gateway

volumes:
  gateway_session:
  bot_data:
